<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" fill="none">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main background circle -->
  <circle cx="512" cy="512" r="512" fill="url(#bgGradient)"/>
  
  <!-- Subtle outer ring -->
  <circle cx="512" cy="512" r="480" fill="none" stroke="#60a5fa" stroke-width="3" opacity="0.2"/>
  
  <!-- Inner glow circle -->
  <circle cx="512" cy="512" r="420" fill="none" stroke="#93c5fd" stroke-width="2" opacity="0.15"/>
  
  <!-- Heartbeat/ECG line with glow effect -->
  <path 
    d="M 240 512 L 380 512 L 440 360 L 520 660 L 600 512 L 784 512" 
    stroke="white" 
    stroke-width="48" 
    stroke-linecap="round" 
    stroke-linejoin="round" 
    fill="none"
    filter="url(#glow)"
  />
</svg>
