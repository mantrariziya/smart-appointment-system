<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmaHosp - Smart Hospital Management</title>
    <style>
      /* Loading screen styles */
      #app-loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #dbeafe 0%, #e0e7ff 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      
      #app-loading.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      
      .loading-logo-container {
        position: relative;
        width: 140px;
        height: 140px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      
      /* Rotating pulse ring */
      .pulse-ring {
        position: absolute;
        width: 160px;
        height: 160px;
        border: 3px solid #3b82f6;
        border-radius: 50%;
        opacity: 0;
        animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
      }
      
      .pulse-ring:nth-child(2) {
        animation-delay: 0.5s;
      }
      
      @keyframes pulse-ring {
        0% {
          transform: scale(0.8);
          opacity: 0;
        }
        50% {
          opacity: 0.3;
        }
        100% {
          transform: scale(1.3);
          opacity: 0;
        }
      }
      
      /* Logo with enhanced zoom animation */
      .loading-logo {
        position: relative;
        width: 120px;
        height: 120px;
        animation: enhanced-zoom 2s ease-in-out infinite;
        filter: drop-shadow(0 20px 25px rgba(0, 0, 0, 0.15));
        z-index: 1;
      }
      
      @keyframes enhanced-zoom {
        0% {
          transform: scale(0.95);
        }
        25% {
          transform: scale(1.05);
        }
        50% {
          transform: scale(0.95);
        }
        75% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(0.95);
        }
      }
      
      .loading-text {
        margin-top: 2.5rem;
        color: #374151;
        font-size: 1.25rem;
        font-weight: 600;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        animation: fade-in-out 2s ease-in-out infinite;
      }
      
      @keyframes fade-in-out {
        0%, 100% {
          opacity: 0.6;
        }
        50% {
          opacity: 1;
        }
      }
      
      .loading-dots {
        display: flex;
        gap: 0.5rem;
        margin-top: 1rem;
      }
      
      .loading-dot {
        width: 10px;
        height: 10px;
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        border-radius: 50%;
        animation: bounce-dot 1.4s ease-in-out infinite;
        box-shadow: 0 2px 4px rgba(37, 99, 235, 0.3);
      }
      
      .loading-dot:nth-child(1) {
        animation-delay: 0ms;
      }
      
      .loading-dot:nth-child(2) {
        animation-delay: 200ms;
      }
      
      .loading-dot:nth-child(3) {
        animation-delay: 400ms;
      }
      
      @keyframes bounce-dot {
        0%, 80%, 100% {
          transform: translateY(0) scale(1);
        }
        40% {
          transform: translateY(-12px) scale(1.1);
        }
      }
      
      /* Shimmer effect */
      .shimmer {
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(255, 255, 255, 0.3),
          transparent
        );
        animation: shimmer 3s infinite;
      }
      
      @keyframes shimmer {
        0% {
          left: -100%;
        }
        100% {
          left: 100%;
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="app-loading">
      <div class="loading-logo-container">
        <!-- Pulse rings -->
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        
        <!-- Logo with shimmer -->
        <div style="position: relative; overflow: hidden; border-radius: 50%;">
          <img src="/logo.svg" alt="SmaHosp" class="loading-logo" />
          <div class="shimmer"></div>
        </div>
      </div>
      
      <div class="loading-text">Loading your workspace...</div>
      <div class="loading-dots">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      // Remove loading screen when React app is ready
      window.addEventListener('load', () => {
        const loader = document.getElementById('app-loading');
        if (loader) {
          loader.classList.add('fade-out');
          setTimeout(() => {
            loader.remove();
          }, 500);
        }
      });
    </script>
  </body>
</html>
